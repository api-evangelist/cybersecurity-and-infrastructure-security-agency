aid: cybersecurity-and-infrastructure-security-agency
name: Cybersecurity and Infrastructure Security Agency
x-type: government
description: >-
  The Cybersecurity and Infrastructure Security Agency (CISA) is the
  United States federal civilian cybersecurity agency, part of the
  Department of Homeland Security. CISA reduces cybersecurity and
  physical security risk for the nation, coordinates federal civilian
  cyber defense, and partners with state, local, tribal, and
  territorial governments and the private sector. CISA publishes a
  number of public, unauthenticated machine-readable feeds, including
  the Known Exploited Vulnerabilities (KEV) catalog (mandatorily
  remediated by federal civilian agencies under Binding Operational
  Directive 22-01), Cybersecurity Advisories, and Common Security
  Advisory Framework (CSAF) advisories. CISA also operates an
  Automated Indicator Sharing (AIS) TAXII 2.1 server that delivers
  STIX cyber threat indicators to vetted partners under a Terms of
  Use and Interconnection Agreement.
